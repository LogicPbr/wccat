spring:
  application:
    name: wccat-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # H2 开发环境
  datasource:
    url: jdbc:h2:mem:wccat;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # Virtual Threads (Java 21)
  threads:
    virtual:
      enabled: true

  # Redis (可选，用于缓存和报警推送，按需启用)
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379

server:
  port: 8080
  servlet:
    context-path: /api

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# 应用配置
app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  broker:
    pingan:
      enabled: false
      base-url: https://api.pingan.com
    huabao:
      enabled: false
      base-url: https://api.huabao.com
    tonghuashun:
      enabled: false
      base-url: https://api.10jqka.com.cn
